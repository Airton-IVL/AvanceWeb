<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Avengers Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="container">
        <h2><i class="fa-solid fa-microchip"></i> Stark Industries</h2>

        <form>
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" placeholder="Correo electrónico" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Contraseña" required>
                <i class="fa-solid fa-eye toggle-password" onclick="mostrarContrasena()"></i>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-id-card"></i>
                <input type="text" placeholder="DNI (8 dígitos)" maxlength="8" required>
            </div>

            <button class="btn btn-primary">
                <i class="fa-solid fa-user-plus"></i> Registrarse
            </button>
        </form>

        <button class="btn btn-guest" onclick="abrirPagina()">
            <i class="fa-solid fa-user"></i> Modo Invitado
        </button>

        <div class="footer">© 2026 Stark Industries</div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
